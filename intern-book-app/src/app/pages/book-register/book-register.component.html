<mat-card class="book-register-card">
    <mat-card-title>書籍登録</mat-card-title>
    <mat-card-content>
        <mat-form-field appearance="fill">
            <mat-label>書名</mat-label>
            <input matInput [(ngModel)]="bookTitle">
        </mat-form-field>

        <mat-form-field appearance="fill">
            <mat-label>あらすじ</mat-label>
            <textarea matInput [(ngModel)]="bookDescription"></textarea>
        </mat-form-field>

        <mat-form-field appearance="fill" class="bookRating">
            <mat-label>評価点</mat-label>
            <input matInput type="number" [(ngModel)]="bookRating">
        </mat-form-field>
    </mat-card-content>
    <mat-card-actions>
        <button mat-raised-button color="primary" (click)="addNewBook()">
            追加
        </button>
    </mat-card-actions>
</mat-card>
